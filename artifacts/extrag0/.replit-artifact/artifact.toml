kind = "web"
previewPath = "/"
title = "extraGO — Marketplace de Extras"
version = "1.0.0"
id = "artifacts/extrag0"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23600

[services.development]
run = "pnpm --filter @workspace/extrag0 run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/extrag0", "run", "build" ]
publicDir = "artifacts/extrag0/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23600"
BASE_PATH = "/"
